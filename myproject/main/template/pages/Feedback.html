{% extends "base.html" %}
{% load static %}

{% block title %}Feedback – PODDAR TOURS & TRAVELS{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 80px auto; padding: 0 20px;">
    <div class="section-title reveal">
        <p>Your Voice Matters</p>
        <h2>Share Your Feedback</h2>
    </div>

    <div class="reveal" style="background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); border: 1px solid #f0f0f0;">
        <form action="" method="post" style="display: grid; gap: 20px;">
            {% csrf_token %}
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="form-group">
                    <label style="display: block; font-weight: 700; margin-bottom: 8px; color: var(--dark);">Full Name *</label>
                    <input type="text" name="name" placeholder="Rahul Sharma" required style="width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #ddd; outline: none; transition: border-color 0.3s;">
                </div>
                <div class="form-group">
                    <label style="display: block; font-weight: 700; margin-bottom: 8px; color: var(--dark);">Email Address *</label>
                    <input type="email" name="email" placeholder="rahul@example.com" required style="width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #ddd; outline: none; transition: border-color 0.3s;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="form-group">
                    <label style="display: block; font-weight: 700; margin-bottom: 8px; color: var(--dark);">Phone Number *</label>
                    <input type="tel" name="phone" placeholder="+91 99032 XXXXX" required style="width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #ddd; outline: none; transition: border-color 0.3s;">
                </div>
                <div class="form-group">
                    <label style="display: block; font-weight: 700; margin-bottom: 8px; color: var(--dark);">City/Address *</label>
                    <input type="text" name="address" placeholder="Kolkata, WB" required style="width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #ddd; outline: none; transition: border-color 0.3s;">
                </div>
            </div>

            <div class="form-group">
                <label style="display: block; font-weight: 700; margin-bottom: 8px; color: var(--dark);">Your Suggestions or Experience</label>
                <textarea name="query" rows="5" placeholder="Tell us about your journey..." style="width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #ddd; outline: none; transition: border-color 0.3s; resize: vertical;"></textarea>
            </div>

            <div style="text-align: center; margin-top: 10px;">
                <button type="submit" class="btn-premium" style="width: 100%; cursor: pointer; border: none;">Submit Feedback <i class="fas fa-paper-plane" style="margin-left: 10px;"></i></button>
            </div>
        </form>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <a href="/" style="color: var(--primary); font-weight: 700; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</div>
{% endblock %}
