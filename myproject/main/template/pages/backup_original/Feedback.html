<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback – PODDAR TOURS & TRAVELS</title>
{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">



</head>

<body>

<div id="header"></div>


  <div class="glass-container reveal" style="max-width: 600px; margin: 60px auto;">
    <h2 style="text-align: center; color: var(--primary); margin-bottom: 30px;">Feedback Form</h2>

    <form action="/submit-feedback" method="post">
      <label for="name">Full Name *</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required>

      <label for="address">Address *</label>
      <input type="text" id="address" name="address" placeholder="Enter your city/address" required>

      <label for="phone">Phone Number *</label>
      <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

      <label for="email">Email *</label>
      <input type="email" id="email" name="email" placeholder="Enter your email address" required>

      <label for="query">Your Query or Suggestions</label>
      <textarea id="query" name="query" rows="4" placeholder="Tell us what you think..."></textarea>

      <label for="captcha">Verification (Enter the text if seen)</label>
      <input type="text" id="captcha" name="captcha" placeholder="Enter captcha">

      <button type="submit" class="submit-btn" style="width: 100%;">Submit Feedback</button>
    </form>

    <a href="/" class="back-btn-link">⬅ Back to Home</a>
  </div>

  <div id="footer"></div>

  <script src="{% static 'js/main.js' %}"></script>

</body>
</html>
