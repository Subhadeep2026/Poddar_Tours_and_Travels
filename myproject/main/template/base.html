{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Poddar Tours & Travels{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script>
      const CHATBOT_ICON_URL = "{% static 'img/chatbot_icon.png' %}";
  </script>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include "components/header.html" %}
  <main class="page-content">
    {% block content %}{% endblock %}
  </main>
  {% include "components/footer.html" %}

  <!-- Chatbot Widget -->
  <div id="chatbot-widget" class="chatbot-closed">
      <button id="chatbot-toggle" class="btn p-0 border-0 rounded-circle shadow-lg">
          <img src="{% static 'img/chatbot_icon.png' %}" alt="TripNova AI icon" style="width: 60px; height: 60px; object-fit: cover; border-radius: 50%;">
      </button>
      <div id="chatbot-window" class="card shadow-lg d-none">
          <div class="card-header text-white d-flex justify-content-between align-items-center" style="background: linear-gradient(135deg, var(--primary), #065f46); border-bottom: none; padding: 15px 20px;">
              <h6 class="mb-0">
                  <img src="{% static 'img/chatbot_icon.png' %}" alt="Icon" style="width: 24px; height: 24px; border-radius: 50%; vertical-align: middle; margin-right: 8px;">
                  TripNova AI <span id="chatbot-status-dot" class="status-online"></span>
              </h6>
              <button id="chatbot-close" class="btn-close btn-close-white" aria-label="Close"></button>
          </div>
          <div class="card-body overflow-auto" id="chatbot-messages" style="height: 300px; font-size: 0.9rem;">
              <div class="bot-message mb-3">
                  <div class="d-flex align-items-start">
                      <img src="{% static 'img/chatbot_icon.png' %}" class="rounded-circle me-2" style="width: 30px; height: 30px; border: 1px solid #ddd;">
                      <div class="message-content shadow-sm">
                          Hello! I am TripNova AI. How can I help you today?
                      </div>
                  </div>
              </div>
          </div>
          <div class="card-footer p-2 bg-white">
              <form id="chatbot-form" class="input-group input-group-sm">
                  <input type="text" id="chatbot-input" class="form-control" placeholder="Ask anything..." autocomplete="off">
                  <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i></button>
              </form>
          </div>
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
