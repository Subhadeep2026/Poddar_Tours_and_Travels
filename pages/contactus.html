<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poddar Tours & Travels - Contact Us</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">



</head>

<body>


  <div id="header"></div>


  <div class="glass-container reveal" style="max-width: 1000px; margin: 60px auto;">
    <div class="row g-5">
      <!-- Contact Info -->
      <div class="col-md-5">
        <h2 style="color: var(--primary); margin-bottom: 25px;">Get in Touch</h2>
        <div
          style="background: rgba(0,128,0,0.05); padding: 25px; border-radius: 15px; border-left: 5px solid var(--primary);">
          <p><strong>📍 Address:</strong><br>
            19A Rabindra Sarani,<br>
            Liluah, Howrah - 711203
          </p>

          <p><strong>📞 Phone:</strong><br>
            +91 9903254599
          </p>

          <p><strong>📧 Email:</strong><br>
            poddartours@gmail.com
          </p>

          <p><strong>🕒 Office Hours:</strong><br>
            Mon–Fri: 10:00 AM – 06:00 PM<br>
            Sat: 10:00 AM – 02:30 PM<br>
            Sun: Closed
          </p>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="col-md-7">
        <h3 style="color: var(--secondary); margin-bottom: 25px;">Send Us a Message</h3>
        <form>
          <label>Your Name *</label>
          <input type="text" placeholder="Full Name" required>

          <label>Your Email *</label>
          <input type="email" placeholder="Email Address" required>

          <label>Phone Number</label>
          <input type="tel" placeholder="Contact number">

          <label>Your Message</label>
          <textarea rows="4" placeholder="How can we help you?"></textarea>

          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>
    </div>

    <a href="../index.html" class="back-btn-link">⬅ Back to Home</a>
  </div>

  <div id="footer"></div>

  <script src="../js/main.js"></script>

</body>

</html>
